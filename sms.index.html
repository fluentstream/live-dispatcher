<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>SMS Dispatcher</title>

        <script type="module">

            import config from "./config/config.js";
            import SmsDispatcher from "./smsDispatcher.js";

            /* These functions correspond to Socket Events, and thus belong to the parent */
            function connectEventHandler(event) {
                console.log("Got socket connect event: ", event);
            }
            function reconnectEventHandler(event) {
                console.log("Got socket reconnect event: ", event);
            }
            function reconnectingEventHandler(event) {
                console.log("Got socket reconnecting event. Attempt number ", event);
            }
            function reconnectAttemptEventHandler(event) {
                console.log("Got socket reconnect attempt event.  Attempt number ", event);
            }
            function reconnectErrorEventHandler(event) {
                console.log("Got socket reconnect error event: ", event);
            }
            function reconnectFailedEventHandler(event) {
                console.log("Got socket reconnect failed event");
            }

            /* These functions are for the SMS Dispatcher */
            function smsMessageHandler(event) {
                console.log("Got smsMessage event: ", event);
            }
            function smsMessageIncomingHandler(event) {
                console.log("Got smsMessageIncoming event: ", event);
            }

            const options = {
                tenant: config.tenant,
                eventScope: "",
                extension: "",
                config,
                connectEventHandler,
                reconnectEventHandler,
                reconnectingEventHandler,
                reconnectAttemptEventHandler,
                reconnectErrorEventHandler,
                reconnectFailedEventHandler,
                smsMessageHandler,
                smsMessageIncomingHandler,
                apikey: config.apikey,
                username: "",
                password: "",
                room: "",
            };

            const dispatcher = new SmsDispatcher(options);

            dispatcher.run();

        </script>
    </head>

    <body>
        <p>Testing SMS Dispatcher</p>
    </body>
</html>
